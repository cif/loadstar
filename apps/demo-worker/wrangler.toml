name = "loadstar-demo"
main = "src/index.ts"
compatibility_date = "2025-01-01"

[assets]
directory = "../demo-client/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[[workflows]]
name = "agent-workflow"
class_name = "AgentWorkflow"
binding = "AGENT_WORKFLOW"

[[durable_objects.bindings]]
name = "RELAY"
class_name = "RelayDO"

[[migrations]]
tag = "v1"
new_classes = ["RelayDO"]

[[d1_databases]]
binding = "DB"
database_name = "loadstar-db"
database_id = "24542b44-a4aa-456c-87cd-2a5ba489e927"

# AI_GATEWAY_ACCOUNT_ID, AI_GATEWAY_ID, AI_GATEWAY_TOKEN, AI_PROVIDER_TOKEN
# Set via: wrangler secret put <NAME>
